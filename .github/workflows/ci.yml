name: CI Build and Lint

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-size: '18'
        cache: 'npm'

    - name: Install Dependencies
      run: npm ci

    - name: Run Linter (Type Check)
      run: npm run lint

    - name: Build Application
      run: npm run build
      env:
        # Prevent any missing env var build failures (Vite doesn't require these at build time for compilation, but we provide mock variables if needed)
        NODE_ENV: production
